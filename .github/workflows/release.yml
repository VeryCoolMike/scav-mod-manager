name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            rpm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Scav Mod Manager ${{ github.ref_name }}"
          releaseBody: "See the assets below to download this version. The app can also auto-update itself from within the app."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Tauri only bundles an installer (.msi) on Windows; also publish the
      # raw standalone .exe as a "portable" build that needs no install.
      - name: package portable Windows build
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p portable
          cp "src-tauri/target/release/scav-mod-manager.exe" \
            "portable/Scav-Mod-Manager_${{ github.ref_name }}_x64_portable.exe"

      - name: upload portable Windows build
        if: matrix.platform == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "portable/Scav-Mod-Manager_${{ github.ref_name }}_x64_portable.exe" \
            --clobber --repo "${{ github.repository }}"
